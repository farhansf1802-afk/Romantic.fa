<!DOCTYPE html>
<html>
<head>
  <title>For Arisha ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 30px;
    }

    /* 💖 Name Glow */
    .name {
      font-size: 50px;
      font-weight: bold;
      background: linear-gradient(90deg, #fff, #ffdde1, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px #ff4b5c; }
    }

    /* ❤️ Heart Beat */
    .heart {
      font-size: 60px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* 💌 Message Box */
    .msg {
      font-size: 22px;
      margin: 20px;
      min-height: 40px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    /* 🌹 Falling Hearts */
    .falling-heart {
      position: absolute;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

  <h1>For You ❤️</h1>

  <div class="name">Arisha 💕</div>

  <div class="heart">💖</div>

  <div class="msg" id="text"></div>

  <button onclick="startLove()">💌 Open My Heart</button>

  <!-- 🎵 Song -->
  <audio id="song">
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script>
    function startLove() {
      document.getElementById("song").play();
      typeWriter();
    }

    // 💌 Typing Effect
    let text = "Arisha 💖 I Love You 😘 Tum meri life ki sabse important ho... 💕";
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 60);
      }
    }

    // 🌹 Falling Hearts
    function createHeart() {
      let heart = document.createElement("div");
      heart.className = "falling-heart";
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 250);
  </script>

</body>
</html>
