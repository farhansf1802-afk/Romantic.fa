<!DOCTYPE html>
<html>
<head>
  <title>For Arisha ❤️</title>

  <!-- ✅ Mobile Zoom Fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
      overflow: hidden;
      touch-action: manipulation;
    }

    h1 {
      margin-top: 20px;
    }

    /* 💖 Name Glow */
    .name {
      font-size: 40px;
      font-weight: bold;
      background: linear-gradient(90deg, #fff, #ffdde1, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px #ff4b5c; }
    }

    /* ❤️ Heart Beat */
    .heart {
      font-size: 50px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* 💌 Message */
    .msg {
      font-size: 20px;
      margin: 20px;
      min-height: 40px;
      padding: 10px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    /* 🌹 Falling Hearts */
    .falling-heart {
      position: absolute;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

  <h1>For You ❤️</h1>

  <div class="name">Arisha 💕</div>

  <div class="heart">💖</div>

  <div class="msg" id="text"></div>

  <button onclick="startLove()">💌 Open My Heart</button>

  <!-- 🎵 Song -->
  <audio id="song" preload="auto">
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script>
    function startLove() {
      let audio = document.getElementById("song");
      audio.play().catch(() => {
        alert("Tap again to play music 💖");
      });
      typeWriter();
    }

    // 💌 Typing Effect
    let text = "Arisha 💖 I Love You 😘 Tum meri life ki sabse special ho... 💕";
