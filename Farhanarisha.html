<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Arisha ❤️</title>

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(#ff758c,#ff7eb3);
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

.envelope{
margin:150px auto;
font-size:100px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
50%{transform:rotate(5deg);}
}

.hide{
display:none;
}

.name{
font-size:45px;
font-weight:bold;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px red;}
}

.photo{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
}

.heart{
font-size:60px;
animation:beat 1s infinite;
}

@keyframes beat{
50%{transform:scale(1.3);}
}

.msg{
font-size:20px;
padding:15px;
}

button{
padding:12px 25px;
border:0;
border-radius:20px;
font-size:18px;
color:#ff416c;
}

.fall{
position:absolute;
top:-20px;
animation:fall 5s linear;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="start">
<div class="envelope" onclick="openLove()">💌</div>
<h2>Open My Heart ❤️</h2>
</div>


<div id="page" class="hide">

<h1>For You ❤️</h1>

<div class="name">Arisha 💕</div>

<br>

<img src="arisha.jpg" class="photo">

<div class="heart">💖</div>

<div class="msg" id="text"></div>

<h2>💍 Will You Be Mine Forever? ❤️</h2>

<button onclick="playMusic()">🎵 Play Music</button>

</div>


<audio id="song" loop>
<source src="song.mp3">
</audio>


<script>

let msg="Arisha ❤️ Tum meri life ki sabse special ho... Tumhari smile meri duniya ki sabse pyari cheez hai 😘💕";

let i=0;

function openLove(){

document.getElementById("start").style.display="none";
document.getElementById("page").style.display="block";

document.getElementById("song").play().catch(()=>{});

type();

}


function type(){

if(i<msg.length){

document.getElementById("text").innerHTML+=msg.charAt(i);

i++;

setTimeout(type,70);

}

}


function playMusic(){

document.getElementById("song").play();

}


function hearts(){

let h=document.createElement("div");

h.className="fall";

h.innerHTML="💗";

h.style.left=Math.random()*100+"vw";

h.style.fontSize="25px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);

}

setInterval(hearts,300);

</script>

</body>
</html>
